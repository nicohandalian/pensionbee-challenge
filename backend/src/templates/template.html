<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acme Co</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='7' fill='%230d6e5f'/></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
    />
    <!-- Plain CSS, hand-written; see backend/src/public/styles.css and
         backend/src/app.ts's publicDir mount -->
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Server-rendered so the header is visible on the very first paint —
         no flash while the widget's JS loads. React then mounts over this
         same container for interactivity (mobile toggle, active-link
         highlight); see frontend/src/site-shell-entry.tsx. Since it renders
         equivalent markup, that swap is a visual no-op. Keep this in sync
         with frontend/src/components/SiteShell.tsx. -->
    <div id="site-shell-root">
      <header class="site-shell">
        <div class="site-shell__bar">
          <a class="site-shell__brand" href="/">Acme Co</a>
          <button
            type="button"
            class="site-shell__toggle"
            aria-expanded="false"
            aria-controls="site-nav"
            aria-label="Toggle navigation"
          >
            <span aria-hidden="true">☰</span>
          </button>
          <nav id="site-nav" class="site-shell__nav" data-open="false">
            <ul>
              <li><a href="/">Home</a></li>
              <li><a href="/about-page">About</a></li>
              <li><a href="/jobs">Jobs</a></li>
              <li><a href="/valves">Valves</a></li>
              <li><a href="/blog">Blog</a></li>
            </ul>
          </nav>
        </div>
      </header>
    </div>
    <main class="content">{{content}}</main>
    <!-- Static, site-wide, and the same on every page, so it's plain HTML
         here rather than pulled into the React widget. -->
    <footer class="site-footer">
      <p>&copy; 2026 Acme Co. All rights reserved.</p>
    </footer>
    <!-- Filename/path come from frontend/vite.widget.config.ts + backend/src/app.ts's /assets mount -->
    <script type="module" src="/assets/site-shell.js"></script>
  </body>
</html>
